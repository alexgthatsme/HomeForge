<!DOCTYPE html>
<!-- HomeForge v2.4 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeForge – Project Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto+Mono:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* SETUP SCREEN */
.setup-screen{position:fixed;inset:0;background:rgba(28,23,16,.82);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.setup-screen.hidden{display:none!important;}
.setup-box{background:var(--paper);border:2px solid var(--ink2);padding:2rem;width:420px;max-width:100%;position:relative;box-shadow:4px 4px 0 var(--ink3);}
.setup-box::before{content:'CONFIDENTIAL';position:absolute;top:.6rem;right:.8rem;font-family:'Special Elite',cursive;font-size:.6rem;color:var(--red);letter-spacing:.2em;opacity:.35;}
.sb-logo{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px solid var(--ink2);}
.sb-ico{width:38px;height:38px;border:2px solid var(--ink2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.sb-logo h2{font-family:'Special Elite',cursive;font-size:1.4rem;color:var(--ink);letter-spacing:.02em;}
.sb-logo p{font-size:.58rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.14em;margin-top:.12rem;}
.sb-intro{font-size:.78rem;color:var(--ink2);line-height:1.65;margin-bottom:.9rem;}
.sb-help{font-size:.75rem;color:var(--ink3);line-height:1.6;margin-bottom:.9rem;padding:.65rem .82rem;background:var(--paper2);border-left:3px solid var(--ink3);}
.sb-help a{color:var(--blue);text-decoration:underline;}
.sb-err{font-size:.72rem;color:var(--red);margin-bottom:.6rem;display:none;font-style:italic;}
.sb-field{margin-bottom:.8rem;}
.sb-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);display:block;margin-bottom:.28rem;}
.sb-input{width:100%;padding:.6rem .75rem;border:1.5px solid var(--rule2);background:white;font-family:'Roboto Mono',monospace;font-size:.82rem;color:var(--ink);}
.sb-input:focus{outline:none;border-color:var(--ink2);}
.sb-btn{width:100%;background:var(--ink);color:var(--paper);border:none;padding:.82rem;font-family:'Special Elite',cursive;font-size:.92rem;cursor:pointer;letter-spacing:.04em;transition:background .18s;}
.sb-btn:hover{background:var(--ink2);}

:root{
  --paper:#f5f0e8;--paper2:#ede8dc;--paper3:#e4ddd0;
  --ink:#1c1710;--ink2:#3d3628;--ink3:#6b6050;--ink4:#9a8e7e;
  --rule:#c8b99a;--rule2:#b0a08a;
  --red:#8b2020;--green:#1a5c2a;--blue:#1a3a5c;
  --stamp:#8b2020;
  --linen: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,160,120,.13) 28px),
           repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(180,160,120,.06) 28px);
  --radius:2px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--paper);
  background-image:var(--linen);
  font-family:'Roboto Mono',ui-monospace,monospace;
  color:var(--ink);min-height:100vh;font-size:14px;line-height:1.55;
}

/* ── HEADER — INVOICE STYLE ── */
header{
  position:sticky;top:0;z-index:50;
  background:var(--ink);
  color:var(--paper);
  padding:0;
  border-bottom:3px solid var(--ink2);
}
.hdr-invoice{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:stretch;
  max-width:100%;
}
.hdr-left{
  padding:.85rem 1.5rem;
  border-right:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;gap:1.25rem;
}
.hdr-logo-mark{
  display:flex;flex-direction:column;gap:.1rem;flex-shrink:0;
}
.hdr-logo-mark .hlm-name{
  font-family:'Special Elite',cursive;
  font-size:1.3rem;
  color:var(--paper);
  letter-spacing:.04em;
  line-height:1;
}
.hdr-logo-mark .hlm-sub{
  font-size:.52rem;text-transform:uppercase;letter-spacing:.2em;
  color:rgba(245,240,232,.4);
}
.hdr-divider{width:1px;height:32px;background:rgba(255,255,255,.15);flex-shrink:0;}
.hdr-invoice-meta{display:flex;flex-direction:column;gap:.15rem;}
.hdr-invoice-meta .him-no{font-size:.58rem;text-transform:uppercase;letter-spacing:.18em;color:rgba(245,240,232,.4);}
.hdr-invoice-meta .him-val{font-size:.72rem;font-weight:700;color:rgba(245,240,232,.75);letter-spacing:.04em;}
.hdr-right{
  display:flex;align-items:center;gap:.5rem;padding:.75rem 1.1rem;
  flex-shrink:0;
}
.hdr-loc-btn{background:none;border:none;cursor:pointer;text-align:left;padding:.2rem .4rem;margin:-.2rem -.4rem;border-radius:2px;transition:background .15s;}
.hdr-loc-btn:hover{background:rgba(255,255,255,.08);}
.hdr-loc-btn:hover .him-no{color:rgba(245,240,232,.75);}
.hdr-loc-btn:hover .him-val{color:rgba(245,240,232,1);}
.hdr-loc-btn .him-no{font-size:.58rem;text-transform:uppercase;letter-spacing:.18em;color:rgba(245,240,232,.4);}
.hdr-loc-btn .him-val{font-size:.72rem;font-weight:700;color:rgba(245,240,232,.75);letter-spacing:.04em;}
.loc-pill{display:flex;align-items:center;gap:.4rem;border:1px solid rgba(255,255,255,.2);padding:.35rem .7rem;background:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
.loc-pill:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);}
.lp-flag{font-size:.95rem;}
.lp-loc{font-size:.68rem;font-weight:700;color:rgba(245,240,232,.85);letter-spacing:.02em;}
.lp-hint{font-size:.54rem;color:rgba(245,240,232,.35);text-transform:uppercase;letter-spacing:.1em;}
.lp-edit{font-size:.58rem;color:rgba(245,240,232,.3);}
.hdr-btn{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;padding:.38rem .75rem;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(245,240,232,.65);cursor:pointer;transition:all .15s;font-family:'Roboto Mono',monospace;white-space:nowrap;}
.hdr-btn:hover{background:rgba(255,255,255,.08);color:var(--paper);border-color:rgba(255,255,255,.35);}
.hdr-btn.active{background:rgba(255,255,255,.12);color:var(--paper);border-color:rgba(255,255,255,.4);}

/* ── VIEWS ── */
.view{display:none;}.view.active{display:block;}
main{max-width:700px;margin:0 auto;padding:2rem 1.25rem 5rem;}

/* ── LIBRARY ── */
.lib-empty{text-align:center;padding:5rem 2rem;}
.lib-empty .le-ico{font-size:2.5rem;margin-bottom:1.25rem;opacity:.3;}
.lib-empty h3{font-family:'Libre Baskerville',serif;font-size:1.05rem;color:var(--ink);margin-bottom:.4rem;}
.lib-empty p{font-size:.72rem;color:var(--ink4);}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.85rem;margin-top:1.25rem;}
.proj-card{background:var(--paper);border:1.5px solid var(--rule2);overflow:hidden;cursor:pointer;transition:all .18s;position:relative;}
.proj-card::after{content:'';position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 12px 12px;border-color:transparent transparent var(--rule2) transparent;}
.proj-card:hover{border-color:var(--ink3);box-shadow:3px 3px 0 var(--rule2);}
.pc-thumb{height:100px;background:var(--paper3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--rule);}
.pc-thumb img{width:100%;height:100%;object-fit:cover;filter:sepia(.15);}
.pc-thumb .pc-no-img{font-size:.62rem;color:var(--ink4);text-transform:uppercase;letter-spacing:.1em;}
.pc-thumb .pc-loc-badge{position:absolute;top:.4rem;right:.4rem;font-size:.6rem;font-weight:700;background:var(--ink);color:var(--paper);padding:.18rem .5rem;letter-spacing:.06em;}
.pc-body{padding:.85rem 1rem 1rem;}
.pc-title{font-family:'Libre Baskerville',serif;font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:.18rem;line-height:1.3;}
.pc-sub{font-size:.68rem;color:var(--ink3);margin-bottom:.6rem;font-style:italic;}
.pc-meta{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}
.pc-stat{font-size:.65rem;font-weight:700;color:var(--ink2);border:1px solid var(--rule2);padding:.15rem .45rem;letter-spacing:.04em;}
.pc-date{font-size:.62rem;color:var(--ink4);margin-left:auto;}
.pc-actions{display:flex;border-top:1px dashed var(--rule);margin-top:.65rem;padding-top:.6rem;gap:.35rem;}
.pca{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;padding:.28rem .55rem;border:1px solid var(--rule2);background:transparent;color:var(--ink3);cursor:pointer;transition:all .14s;font-family:'Roboto Mono',monospace;}
.pca:hover{border-color:var(--ink2);color:var(--ink);}
.pca.danger:hover{border-color:var(--red);color:var(--red);}
.new-project-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:var(--ink);color:var(--paper);border:none;padding:.88rem;font-family:'Special Elite',cursive;font-size:1rem;cursor:pointer;transition:background .18s;margin-bottom:1.5rem;letter-spacing:.04em;}
.new-project-btn:hover{background:var(--ink2);}

/* ── PAGE HEADING ── */
.page-rule{border:none;border-top:2px solid var(--ink);margin-bottom:1.5rem;position:relative;}
.page-rule::after{content:attr(data-label);position:absolute;top:-10px;left:0;background:var(--paper);padding-right:.6rem;font-size:.6rem;text-transform:uppercase;letter-spacing:.18em;color:var(--ink3);}

/* ── STEP NAV ── */
.step-nav{display:flex;margin-bottom:1.75rem;border:1.5px solid var(--rule2);background:var(--paper2);}
.step-tab{flex:1;padding:.62rem .35rem;text-align:center;cursor:pointer;border-right:1px solid var(--rule);transition:all .18s;}
.step-tab:last-child{border-right:none;}
.step-tab.active{background:var(--ink);color:var(--paper);}
.step-tab.done{background:var(--paper3);}
.tn{font-size:.5rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink4);display:block;margin-bottom:.1rem;}
.step-tab.active .tn{color:rgba(245,240,232,.45);}
.tl{font-size:.72rem;font-weight:700;display:block;color:var(--ink2);letter-spacing:.01em;}
.step-tab.active .tl{color:var(--paper);}
.step-tab.done .tl{color:var(--ink3);}

/* ── PANELS ── */
.panel{display:none;animation:fadeUp .25s ease forwards;}
.panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:var(--paper);border:1.5px solid var(--rule2);margin-bottom:1.25rem;position:relative;}
.card-hd{padding:.82rem 1.1rem .55rem;border-bottom:1px solid var(--rule);}
.ctag{font-size:.55rem;text-transform:uppercase;letter-spacing:.2em;color:var(--ink4);margin-bottom:.18rem;}
.cttl{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:700;color:var(--ink);}
.card-bd{padding:1.1rem;}

/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--rule2);background:var(--paper2);padding:2.25rem;text-align:center;transition:all .2s;min-height:165px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;}
.upload-zone.drag-over{border-color:var(--ink2);background:var(--paper3);}
.uico{font-size:2rem;margin-bottom:.1rem;opacity:.7;}
.upload-zone h3{font-family:'Libre Baskerville',serif;font-size:.95rem;color:var(--ink);}
.upload-zone p{font-size:.72rem;color:var(--ink3);}
.upload-actions{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.5rem;}
.upload-label{display:inline-flex;align-items:center;gap:.35rem;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;padding:.48rem .9rem;cursor:pointer;transition:all .15s;font-family:'Roboto Mono',monospace;border:1.5px solid;}
.upload-label.browse{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.upload-label.browse:hover{background:var(--ink2);}
.upload-label.camera{background:transparent;color:var(--ink2);border-color:var(--rule2);}
.upload-label.camera:hover{border-color:var(--ink2);background:var(--paper3);}
.upload-label input{display:none;}
.upload-preview-img{max-width:100%;max-height:180px;object-fit:contain;border:1.5px solid var(--rule2);display:none;filter:sepia(.1);}
.upload-done-row{display:none;flex-direction:column;align-items:center;gap:.4rem;}
.upload-clear{font-size:.65rem;color:var(--ink4);cursor:pointer;background:none;border:none;text-decoration:underline;text-underline-offset:2px;font-family:'Roboto Mono',monospace;}
.upload-clear:hover{color:var(--red);}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:.38rem;padding:.6rem .9rem;background:var(--paper3);border-bottom:1px solid var(--rule);flex-wrap:wrap;}
.tbtn{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;padding:.32rem .65rem;border:1.5px solid var(--rule2);background:transparent;color:var(--ink3);cursor:pointer;transition:all .14s;font-family:'Roboto Mono',monospace;}
.tbtn:hover{border-color:var(--ink2);color:var(--ink);}
.tbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.tbtn.del{color:var(--ink4);}
.tbtn.del:hover{border-color:var(--red);color:var(--red);}
.tsep{width:1px;height:15px;background:var(--rule);margin:0 .1rem;}
.ubadge{font-size:.6rem;font-weight:700;color:var(--ink2);border:1px solid var(--rule2);padding:.2rem .48rem;letter-spacing:.08em;text-transform:uppercase;}
.thint{font-size:.62rem;color:var(--ink4);margin-left:auto;font-style:italic;}

/* ── CANVAS ── */
.cwrap{position:relative;overflow:hidden;background:#111;touch-action:none;}
.cwrap canvas{display:block;max-width:100%;cursor:crosshair;}
.cwrap.idle canvas{cursor:default;}
.meas-list{margin-top:.65rem;display:flex;flex-direction:column;gap:.3rem;max-height:150px;overflow-y:auto;}
.mi{display:grid;grid-template-columns:13px 1fr auto auto;gap:.45rem;align-items:center;padding:.42rem .65rem;background:var(--paper2);border-left:2px solid var(--ink2);}
.msw{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mname{font-size:.74rem;color:var(--ink2);}
.mval{font-size:.68rem;font-weight:700;color:var(--ink);font-family:'Roboto Mono',monospace;}
.mdel{background:none;border:none;cursor:pointer;color:var(--ink4);font-size:.8rem;}
.mdel:hover{color:var(--red);}

/* ── NAV ── */
.nav-row{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.65rem;}
.nbtn{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;padding:.52rem 1.05rem;border:1.5px solid;cursor:pointer;transition:all .15s;font-family:'Roboto Mono',monospace;}
.nnext{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.nnext:hover{background:var(--ink2);}
.nnext:disabled{opacity:.35;cursor:not-allowed;}
.nback{background:transparent;color:var(--ink3);border-color:var(--rule2);}
.nback:hover{border-color:var(--ink2);color:var(--ink);}

.chip-row{display:flex;gap:.32rem;flex-wrap:wrap;margin-top:.6rem;}
.chip{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);border:1px solid var(--rule);padding:.2rem .5rem;cursor:pointer;transition:all .13s;font-family:'Roboto Mono',monospace;}
.chip:hover{border-color:var(--ink2);color:var(--ink);background:var(--paper2);}

textarea{width:100%;min-height:90px;padding:.8rem .9rem;background:white;border:1.5px solid var(--rule2);font-family:'Roboto Mono',monospace;font-size:.82rem;color:var(--ink);resize:vertical;line-height:1.65;transition:border-color .15s;}
textarea:focus{outline:none;border-color:var(--ink2);}
textarea::placeholder{color:var(--ink4);font-style:italic;}
.gen-btn{width:100%;background:var(--ink);color:var(--paper);border:none;padding:.88rem;font-family:'Special Elite',cursive;font-size:1rem;cursor:pointer;transition:background .18s;margin-top:.85rem;display:flex;align-items:center;justify-content:center;gap:.6rem;letter-spacing:.04em;}
.gen-btn:hover{background:var(--ink2);}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── OUTPUT ── */
.loading{display:none;text-align:center;padding:4rem 2rem;}
.loading.show{display:block;}
.spinner{width:36px;height:36px;border:2px solid var(--rule);border-top:2px solid var(--ink);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1.25rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.78rem;color:var(--ink3);font-style:italic;}
.lsub{font-size:.68rem;color:var(--ink4);margin-top:.3rem;}

.out{display:none;animation:fadeUp .35s ease forwards;}
.out.show{display:block;}

/* Invoice-style output header */
.out-hdr{
  border:2px solid var(--ink);
  margin-bottom:1.5rem;
  background:var(--paper);
  position:relative;
}
.out-hdr-top{
  background:var(--ink);
  color:var(--paper);
  padding:.65rem 1.1rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
}
.out-hdr-top .out-tag{font-size:.55rem;text-transform:uppercase;letter-spacing:.2em;color:rgba(245,240,232,.45);}
.out-actions{display:flex;gap:.4rem;}
.oact{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;padding:.32rem .65rem;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(245,240,232,.7);cursor:pointer;transition:all .14s;font-family:'Roboto Mono',monospace;white-space:nowrap;}
.oact:hover{background:rgba(255,255,255,.1);color:var(--paper);}
.oact.save-btn{border-color:rgba(245,240,232,.45);color:rgba(245,240,232,.85);}
.oact.saved{background:rgba(255,255,255,.12);color:var(--paper);}
.out-hdr-body{
  padding:1rem 1.25rem 1.1rem;
  display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start;
}
.out-ttl{font-family:'Special Elite',cursive;font-size:1.6rem;color:var(--ink);letter-spacing:.03em;line-height:1.15;}
.out-loc-tag{font-size:.65rem;color:var(--ink3);margin-top:.3rem;font-style:italic;}
.out-hdr-stamps{display:flex;flex-direction:column;gap:.4rem;align-items:flex-end;}
.hdr-stamp{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);border:1.5px solid var(--rule2);padding:.22rem .55rem;text-align:center;}
.hdr-stamp span{display:block;font-family:'Special Elite',cursive;font-size:.88rem;color:var(--ink2);letter-spacing:.04em;text-transform:none;}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1.5px solid var(--rule2);margin-bottom:1.5rem;}
.stat{padding:.85rem 1rem;text-align:center;border-right:1px solid var(--rule);}
.stat:last-child{border-right:none;}
.sv{font-family:'Special Elite',cursive;font-size:1.2rem;color:var(--ink);letter-spacing:.02em;}
.sl{font-size:.55rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink4);margin-top:.15rem;}

.sec{background:var(--paper);border:1.5px solid var(--rule2);margin-bottom:1rem;overflow:hidden;}
.sec-hd{padding:.58rem 1rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:.6rem;background:var(--paper2);}
.sh-tag{font-size:.52rem;text-transform:uppercase;letter-spacing:.18em;color:var(--ink4);}
.sec-hd h2{font-family:'Libre Baskerville',serif;font-size:.88rem;font-weight:700;color:var(--ink);}
.sec-bd{padding:1rem 1.1rem;}

.photo-wrap{background:#111;}
.photo-wrap canvas{display:block;max-width:100%;}
.bp-pre{background:#0d1117;padding:1.1rem;font-family:'Roboto Mono',monospace;font-size:.64rem;color:#8eb89a;line-height:1.45;white-space:pre;overflow-x:auto;}
.bp-cap{padding:.4rem 1.1rem .65rem;font-size:.65rem;color:var(--ink4);font-style:italic;}

.cost-table{width:100%;border-collapse:collapse;font-size:.8rem;font-family:'Roboto Mono',monospace;}
.cost-table th{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink4);padding:.4rem .5rem;border-bottom:2px solid var(--rule2);text-align:left;}
.cost-table td{padding:.42rem .5rem;border-bottom:1px solid var(--rule);vertical-align:middle;}
.cost-table tr:last-child td{border-bottom:none;}
.cost-table input[type=number]{width:100%;padding:.25rem .35rem;border:1px solid transparent;background:transparent;font-family:'Roboto Mono',monospace;font-size:.8rem;color:var(--ink);text-align:right;}
.cost-table input[type=number]:focus{outline:none;border-color:var(--rule2);background:white;}
.line-total{font-size:.75rem;font-weight:700;color:var(--ink);text-align:right;}
.cost-footer{display:flex;justify-content:flex-end;align-items:center;gap:1.25rem;padding:.75rem .5rem .25rem;border-top:2px solid var(--ink2);margin-top:.25rem;}
.cost-label{font-size:.65rem;text-transform:uppercas
